name: Release Webhook

on:
  push:
    tags:
      - "v*"

jobs:
  webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Get version identifier
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Call webhook
        run: |
          TAG_NAME="${{ steps.get_version.outputs.version }}"
          REF="$TAG_NAME"
          REF_LINK_TEXT="$TAG_NAME"
          REF_LINK_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG_NAME"
          curl "${{ secrets.DEV_WEBHOOK_URL }}/prod?tag=$TAG_NAME&ref=$REF&ref_link_text=$REF_LINK_TEXT&ref_link_url=$REF_LINK_URL" \
            -H "Authorization: Bearer ${{ secrets.DEV_WEBHOOK_API_KEY }}"
